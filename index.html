<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>House-kun 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.35);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.12);
    --blur: blur(20px);
    --accent: #34C759;
    --text: #1c1c1e;
    --subtext: #6e6e73;
    --radius: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #e8f7ee 0%, #d4f0e0 25%, #c8ecd6 50%, #d0f0d8 75%, #c8ecd4 100%);
    background-attachment: fixed;
    overflow-x: hidden;
  }

  /* Ambient blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(80,200,120,0.35), transparent 70%);
    top: -100px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(60,180,100,0.3), transparent 70%);
    bottom: -80px; right: -80px;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .header-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 28px;
    line-height: 1;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  .title-block p {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }

  /* Main content */
  main {
    position: relative; z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Category section */
  .category {
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }
  .category:nth-child(1) { animation-delay: 0.05s }
  .category:nth-child(2) { animation-delay: 0.1s }
  .category:nth-child(3) { animation-delay: 0.15s }
  .category:nth-child(4) { animation-delay: 0.2s }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px) }
    to   { opacity: 1; transform: translateY(0) }
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .category-icon { font-size: 18px; }

  .category-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--subtext);
  }

  /* Glass card container */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  /* Item card */
  .item-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: var(--blur) saturate(160%);
    -webkit-backdrop-filter: var(--blur) saturate(160%);
    box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.5);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    text-decoration: none;
    display: block;
    position: relative;
  }

  .item-card:active {
    transform: scale(0.96);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* Subtle shine */
  .item-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
    border-radius: var(--radius) var(--radius) 0 0;
    pointer-events: none;
    z-index: 1;
  }

  .item-img {
    display: none;
  }

  .item-info {
    padding: 14px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .item-cat-icon {
    font-size: 28px;
    flex-shrink: 0;
    line-height: 1;
  }

  .item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .item-store {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }

  .store-amazon {
    background: rgba(255, 153, 0, 0.18);
    color: #b35900;
    border: 1px solid rgba(255,153,0,0.3);
  }

  .store-safeway {
    background: rgba(227, 30, 36, 0.12);
    color: #c0161b;
    border: 1px solid rgba(227,30,36,0.25);
  }

  .store-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .store-amazon .store-dot { background: #ff9900; }
  .store-safeway .store-dot { background: #e31e24; }

  /* Empty state placeholder */
  .placeholder-card .item-img {
    background: rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    padding: 24px;
  }

  .coming-soon {
    text-align: center;
    padding: 32px 20px;
    background: var(--glass-bg);
    border: 1px dashed var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    color: var(--subtext);
    font-size: 13px;
  }
  .coming-soon span { display: block; font-size: 28px; margin-bottom: 8px; }
</style>

// Render
// ─────────────────────────────────────────
function buildStoreTag(store) {
  const label = store === 'amazon' ? '🛒 Amazon' : '🏪 Safeway';
  return `<span class="item-store store-${store}"><span class="store-dot"></span>${store === 'amazon' ? 'Amazon' : 'Safeway'}</span>`;
}

function buildCard(item, catIcon, catIconImg) {
  const imgEl = '';

  return `
    <a class="item-card" href="${item.link}" target="_blank" rel="noopener">
      ${imgEl}
      <div class="item-info">
        <div class="item-name-row">
          <div class="item-name">${item.name}</div>
        </div>
        ${buildStoreTag(item.store)}
      </div>
    </a>`;
}

const app = document.getElementById('app');
categories.forEach(cat => {
  const iconEl = cat.iconImg
    ? `<img src="${cat.iconImg}" style="width:24px;height:24px;object-fit:contain;vertical-align:middle">`
    : `<span class="category-icon">${cat.icon}</span>`;
  const html = `
    <section class="category">
      <div class="category-header">
        ${iconEl}
        <span class="category-title">${cat.name}</span>
      </div>
      <div class="card-grid">
        ${cat.items.map(item => buildCard(item, cat.icon, cat.iconImg)).join('')}
      </div>
    </section>`;
  app.insertAdjacentHTML('beforeend', html);
});

// Deep link to Amazon app first, fall back to web add-to-cart
document.querySelectorAll('.item-card').forEach(card => {
  card.addEventListener('click', e => {
    e.preventDefault();
    const href = card.getAttribute('href');
    if (!href) return;

    const isAmazon = href.includes('amazon.com') || href.includes('a.co') || href.includes('amzn.to');
    const isSafeway = href.includes('safeway.com');

    if (isAmazon) {
      const cartMatch = href.match(/ASIN\.1=([A-Z0-9]{10})/);
      const dpMatch = href.match(/\/dp\/([A-Z0-9]{10})/);
      const asin = (cartMatch && cartMatch[1]) || (dpMatch && dpMatch[1]);

      if (asin) {
        const webCartUrl = `https://www.amazon.com/gp/aws/cart/add.html?ASIN.1=${asin}&Quantity.1=1`;
        // Try Amazon app via universal link first (works on iOS & Android)
        // Amazon's app intercepts amazon.com links automatically on mobile
        // Use a hidden iframe trick to attempt app launch, fallback to web
        const appUrl = `amazon://add-to-cart?ASIN=${asin}`;
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        iframe.src = appUrl;
        // If app doesn't open within 800ms, redirect to web cart
        setTimeout(() => {
          document.body.removeChild(iframe);
          window.location.href = webCartUrl;
        }, 800);
      } else {
        // Short link — open directly, Amazon app will intercept if installed
        window.location.href = href;
      }
    } else if (isSafeway) {
      // Extract product ID from Safeway URL for deep link
      const pidMatch = href.match(/product-details\.(\d+)\.html/);
      if (pidMatch) {
        const pid = pidMatch[1];
        // Try Safeway app deep link with product
        const appUrl = `safeway://product/${pid}`;
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        iframe.src = appUrl;
        setTimeout(() => {
          document.body.removeChild(iframe);
          window.location.href = href;
        }, 800);
      } else {
        window.location.href = href;
      }
    } else {
      window.location.href = href;
    }
  });
});
